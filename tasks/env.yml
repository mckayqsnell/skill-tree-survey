version: '3'

# =============================================================================
# 1Password-backed environment management.
# Vaults (derived from VAULT_PREFIX in .setup.config): SKILL-TREE-LOCAL, SKILL-TREE-PROD.
# Each env var is one 1Password item: title = VAR_NAME, value = password/credential field.
# =============================================================================

tasks:
  generate:
    desc: "Pull secrets from 1Password into .env.<env> (ENV=local|prod, default local)"
    deps: [_check_op]
    vars:
      ENV: '{{.ENV | default "local"}}'
    cmds:
      - ./scripts/generate-env.sh "{{.ENV}}"

  status:
    desc: "Show which .env files exist locally"
    silent: true
    cmds:
      - |
        echo "Local .env files:"
        for env in local prod; do
          if [ -f ".env.$env" ]; then echo "  $env: ✅"; else echo "  $env: ❌"; fi
        done

  setup:
    desc: "Install 1Password CLI, sign in, and pin the account (scripts/setup-1password.sh)"
    cmds:
      - ./scripts/setup-1password.sh

  clean:
    desc: "Delete all generated .env files"
    prompt: "Remove all .env.* files?"
    cmds:
      - rm -f .env .env.*
      - echo "Removed all .env files"

  _check_op:
    silent: true
    preconditions:
      - sh: command -v op >/dev/null 2>&1
        msg: |
          ❌ 1Password CLI not installed. Run: task env:setup
      - sh: op account list >/dev/null 2>&1
        msg: |
          ❌ Not signed in to 1Password. Run: op signin   (or: task env:setup)
