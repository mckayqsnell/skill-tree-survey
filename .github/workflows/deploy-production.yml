name: Deploy to Production Environment

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deployment_message:
        description: 'Deployment message/reason'
        required: false
        default: 'Production environment deployment'
      skip_health_check:
        description: 'Skip health checks (use with caution)'
        required: false
        type: boolean
        default: false
      reset_database:
        description: '🚨 EXTREME DANGER: Reset PRODUCTION database - Type "RESET-PRODUCTION-DATABASE"'
        required: false
        type: string
        default: ''
      reset_database_confirm_2:
        description: '⚠️  Type "RESET-PRODUCTION-DATABASE" again (2/5)'
        required: false
        type: string
        default: ''
      reset_database_confirm_3:
        description: '⚠️  Type "RESET-PRODUCTION-DATABASE" again (3/5)'
        required: false
        type: string
        default: ''
      reset_database_confirm_4:
        description: '⚠️  Type "RESET-PRODUCTION-DATABASE" again (4/5)'
        required: false
        type: string
        default: ''
      reset_database_confirm_5:
        description: '🛑 FINAL: Type "RESET-PRODUCTION-DATABASE" one last time (5/5)'
        required: false
        type: string
        default: ''

jobs:
  build-images:
    uses: ./.github/workflows/build-and-cache.yml
    secrets: inherit

  validate-reset:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.reset_database != ''
    runs-on: self-hosted
    steps:
      - name: Validate production database reset confirmation
        run: |
          echo "🔒 Validating PRODUCTION database reset confirmation..."
          echo "🚨 THIS WILL DELETE ALL PRODUCTION DATA!"

          EXPECTED="RESET-PRODUCTION-DATABASE"
          CONFIRM_1="${{ github.event.inputs.reset_database }}"
          CONFIRM_2="${{ github.event.inputs.reset_database_confirm_2 }}"
          CONFIRM_3="${{ github.event.inputs.reset_database_confirm_3 }}"
          CONFIRM_4="${{ github.event.inputs.reset_database_confirm_4 }}"
          CONFIRM_5="${{ github.event.inputs.reset_database_confirm_5 }}"

          if [ "$CONFIRM_1" != "$EXPECTED" ] || [ "$CONFIRM_2" != "$EXPECTED" ] || [ "$CONFIRM_3" != "$EXPECTED" ] || [ "$CONFIRM_4" != "$EXPECTED" ] || [ "$CONFIRM_5" != "$EXPECTED" ]; then
            echo "❌ Production database reset confirmation FAILED!"
            echo "To reset the PRODUCTION database, you must type '$EXPECTED' in ALL FIVE confirmation fields."
            echo "Confirmations received:"
            echo "  1: '$CONFIRM_1'"
            echo "  2: '$CONFIRM_2'"
            echo "  3: '$CONFIRM_3'"
            echo "  4: '$CONFIRM_4'"
            echo "  5: '$CONFIRM_5'"
            exit 1
          fi

          echo "🚨🚨🚨 PRODUCTION DATABASE RESET CONFIRMED BY ${{ github.actor }} 🚨🚨🚨"
          echo "⚠️  ALL PRODUCTION DATA WILL BE PERMANENTLY DELETED!"
          echo "🕒 Reset initiated at: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"

  deploy:
    needs: [build-images, validate-reset]
    if: always() && needs.build-images.result == 'success' && (needs.validate-reset.result == 'success' || needs.validate-reset.result == 'skipped')
    runs-on: self-hosted
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log deployment start
        run: |
          echo "🚀 Starting production environment deployment"
          echo "Initiated by: ${{ github.actor }}"
          echo "Deployment message: ${{ github.event.inputs.deployment_message || 'Automatic deployment from main branch' }}"
          echo "Commit: ${{ github.sha }}"
          echo "Image tag: ${{ needs.build-images.outputs.image-tag }}"
          echo "Timestamp: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"

      - name: Download built images
        uses: actions/download-artifact@v4
        with:
          name: docker-images-${{ needs.build-images.outputs.image-tag }}

      - name: Setup SSH for deployment
        run: |
          echo "🔐 Setting up SSH connection to production instance"

          # Create .ssh directory if it doesn't exist
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          # Write the SSH private key to a file
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/prod_key
          chmod 600 ~/.ssh/prod_key

          # Add production instance to known_hosts to avoid verification prompt
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

          # Test the connection with the private key
          ssh -i ~/.ssh/prod_key -o ConnectTimeout=10 ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }} 'echo "✅ SSH connection successful"'

      - name: Backup current deployment
        run: |
          echo "📋 Creating deployment backup"

          # Ship images and docker-compose file to production instance
          scp -i ~/.ssh/prod_key backend-${{ needs.build-images.outputs.image-tag }}.tar.gz \
              frontend-${{ needs.build-images.outputs.image-tag }}.tar.gz \
              docker-compose.prod.yml \
              ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }}:/tmp/

          # Create backup on remote instance
          ssh -i ~/.ssh/prod_key ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }} '
            set -e

            cd ~/skill-tree-survey || { echo "❌ Project directory not found"; exit 1; }

            echo "📦 Backing up current deployment"

            # Create backup directory with timestamp
            BACKUP_DIR="backup_$(date +%Y%m%d_%H%M%S)"
            mkdir -p "$BACKUP_DIR"

            # Backup current .env if exists
            if [ -f .env ]; then
              cp .env "$BACKUP_DIR/.env.backup"
              echo "✅ Environment file backed up"
            fi

            # Backup current docker-compose.prod.yml if exists
            if [ -f docker-compose.prod.yml ]; then
              cp docker-compose.prod.yml "$BACKUP_DIR/docker-compose.prod.yml.backup"
              echo "✅ Docker compose file backed up"
            fi

            # Get current image IDs for rollback
            CURRENT_BACKEND_IMAGE=$(docker-compose -f docker-compose.prod.yml images -q backend 2>/dev/null || echo "none")
            CURRENT_FRONTEND_IMAGE=$(docker-compose -f docker-compose.prod.yml images -q frontend 2>/dev/null || echo "none")

            # Store current image info for potential rollback
            cat > "$BACKUP_DIR/rollback_info.txt" << EOF
          BACKEND_IMAGE_ID=$CURRENT_BACKEND_IMAGE
          FRONTEND_IMAGE_ID=$CURRENT_FRONTEND_IMAGE
          BACKUP_TIMESTAMP=$(date -u +"%Y-%m-%d %H-%M-%S UTC")
          PREVIOUS_COMMIT=${{ github.sha }}
          EOF

            echo "✅ Backup created: $BACKUP_DIR"
            echo "BACKUP_DIR=$BACKUP_DIR" >> /tmp/deployment_vars.env

            # Keep only last 3 backups to save space
            ls -1dt backup_* 2>/dev/null | tail -n +4 | xargs -r rm -rf
            echo "🧹 Old backups cleaned up"
          '

      - name: Deploy new images
        run: |
          echo "🚀 Deploying new images to production environment"

          ssh -i ~/.ssh/prod_key ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }} '
            set -e
            source /tmp/deployment_vars.env

            cd ~/skill-tree-survey

            echo "📦 Loading new Docker images"
            cd /tmp
            gunzip -f backend-${{ needs.build-images.outputs.image-tag }}.tar.gz frontend-${{ needs.build-images.outputs.image-tag }}.tar.gz
            docker load -i backend-${{ needs.build-images.outputs.image-tag }}.tar
            docker load -i frontend-${{ needs.build-images.outputs.image-tag }}.tar

            # Clean up tar files immediately
            rm -f *.tar

            cd ~/skill-tree-survey

            echo "📝 Updating docker-compose.prod.yml file"
            # Copy the new docker-compose file from /tmp to project directory
            cp /tmp/docker-compose.prod.yml docker-compose.prod.yml
            echo "✅ Docker compose file updated with latest version"

            echo "📝 Updating production environment configuration"
            cat > .env << EOF
          # Backend Configuration
          ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}
          DATABASE_URL=sqlite:////app/data/skill_survey.db
          CORS_ORIGINS=${{ secrets.CORS_ORIGINS }}
          RESET_DATABASE=${{ (github.event.inputs.reset_database == 'RESET-PRODUCTION-DATABASE' && github.event.inputs.reset_database_confirm_2 == 'RESET-PRODUCTION-DATABASE' && github.event.inputs.reset_database_confirm_3 == 'RESET-PRODUCTION-DATABASE' && github.event.inputs.reset_database_confirm_4 == 'RESET-PRODUCTION-DATABASE' && github.event.inputs.reset_database_confirm_5 == 'RESET-PRODUCTION-DATABASE') && 'true' || 'false' }}
          ENVIRONMENT=production

          # Frontend Configuration
          VITE_API_URL=${{ secrets.VITE_API_URL }}

          # Deployment info
          IMAGE_TAG=${{ needs.build-images.outputs.image-tag }}
          DEPLOYED_AT=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          DEPLOYED_BY=${{ github.actor }}
          COMMIT_SHA=${{ github.sha }}
          EOF

            # Check if database reset is requested
            RESET_DB=${{ (github.event.inputs.reset_database == 'RESET-PRODUCTION-DATABASE' && github.event.inputs.reset_database_confirm_2 == 'RESET-PRODUCTION-DATABASE' && github.event.inputs.reset_database_confirm_3 == 'RESET-PRODUCTION-DATABASE' && github.event.inputs.reset_database_confirm_4 == 'RESET-PRODUCTION-DATABASE' && github.event.inputs.reset_database_confirm_5 == 'RESET-PRODUCTION-DATABASE') && 'true' || 'false' }}

            if [ "$RESET_DB" = "true" ]; then
              echo "🚨🚨🚨 RESETTING PRODUCTION DATABASE - Removing volume... 🚨🚨🚨"
              docker-compose -f docker-compose.prod.yml down -v --remove-orphans
              echo "✅ Production database volume removed. Will be recreated with fresh data."
              echo "Reset performed by: ${{ github.actor }} at $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            else
              echo "🔄 Stopping current services (preserving production data)"
              docker-compose -f docker-compose.prod.yml down --remove-orphans
            fi

            echo "🚀 Starting new services"
            export IMAGE_TAG=${{ needs.build-images.outputs.image-tag }}
            docker-compose -f docker-compose.prod.yml up -d

            echo "⏳ Waiting for services to initialize (30 seconds)"
            sleep 30
          '

      - name: Comprehensive health checks
        if: github.event.inputs.skip_health_check != 'true'
        run: |
          echo "🏥 Running comprehensive health checks"

          # Function to check service health
          check_service_health() {
            local service_name=$1
            local health_url=$2
            local max_attempts=20
            local attempt=1

            echo "Checking $service_name health at $health_url"

            while [ $attempt -le $max_attempts ]; do
              echo "  Attempt $attempt/$max_attempts"

              if curl -f -s --max-time 10 "$health_url" > /dev/null 2>&1; then
                echo "✅ $service_name is healthy"
                return 0
              fi

              if [ $attempt -eq $max_attempts ]; then
                echo "❌ $service_name health check failed after $max_attempts attempts"
                return 1
              fi

              sleep 5
              attempt=$((attempt + 1))
            done
          }

          # Function to check API endpoint
          check_api_endpoint() {
            local endpoint_name=$1
            local url=$2
            local expected_status=${3:-200}

            echo "Testing $endpoint_name endpoint: $url"

            response=$(curl -s -w "%{http_code}" -o /tmp/response.txt "$url" || echo "000")

            if [ "$response" = "$expected_status" ]; then
              echo "✅ $endpoint_name endpoint responded with $response"
              return 0
            else
              echo "❌ $endpoint_name endpoint failed. Expected $expected_status, got $response"
              if [ -f /tmp/response.txt ]; then
                echo "Response body:"
                cat /tmp/response.txt | head -10
              fi
              return 1
            fi
          }

          # Run health checks via SSH to production instance
          ssh -i ~/.ssh/prod_key ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }} '
            # Check if containers are running
            echo "📊 Container status:"
            docker-compose -f ~/skill-tree-survey/docker-compose.prod.yml ps

            # Check container logs for obvious errors
            echo "📋 Recent container logs (last 20 lines each):"
            echo "--- Backend logs ---"
            docker-compose -f ~/skill-tree-survey/docker-compose.prod.yml logs --tail=20 backend
            echo "--- Frontend logs ---"
            docker-compose -f ~/skill-tree-survey/docker-compose.prod.yml logs --tail=20 frontend
          '

          # Health check functions (run from GitHub Actions runner)

          # 1. Backend health endpoint
          if ! check_service_health "Backend" "http://${{ secrets.EC2_HOST }}:8000/health"; then
            echo "❌ Backend health check failed"
            exit 1
          fi

          # 2. Frontend accessibility (production through nginx proxy)
          if ! check_service_health "Frontend" "https://${{ secrets.EC2_HOST }}"; then
            echo "⚠️  HTTPS frontend check failed, trying HTTP..."
            if ! check_service_health "Frontend" "http://${{ secrets.EC2_HOST }}"; then
              echo "❌ Frontend health check failed (both HTTPS and HTTP)"
              exit 1
            fi
          fi

          # 3. API endpoints
          if ! check_api_endpoint "Questions Base API" "http://${{ secrets.EC2_HOST }}:8000/api/questions/base"; then
            echo "❌ Questions API check failed"
            exit 1
          fi

          # 5. Test CORS headers
          echo "🔒 Testing CORS configuration"
          cors_response=$(curl -s -H "Origin: ${{ secrets.VITE_API_URL }}" \
            -H "Access-Control-Request-Method: GET" \
            -H "Access-Control-Request-Headers: Content-Type" \
            -X OPTIONS "http://${{ secrets.EC2_HOST }}:8000/api/questions/base" \
            -w "%{http_code}" -o /dev/null || echo "000")

          if [ "$cors_response" = "200" ] || [ "$cors_response" = "204" ]; then
            echo "✅ CORS configuration working"
          else
            echo "⚠️  CORS preflight returned $cors_response (may be normal)"
          fi

          # 6. Test frontend-backend integration (production through nginx proxy)
          echo "🔗 Testing frontend-backend integration"
          frontend_content=$(curl -s "https://${{ secrets.EC2_HOST }}" 2>/dev/null || curl -s "http://${{ secrets.EC2_HOST }}")
          if echo "$frontend_content" | grep -i "skill" > /dev/null; then
            echo "✅ Frontend content looks correct"
          else
            echo "⚠️  Frontend content may not be loading correctly"
          fi

          # 7. Public URL check (if nginx is configured)
          if curl -f -s --max-time 10 "https://skills-survey.heal.engineering/health" > /dev/null 2>&1; then
            echo "✅ Public URL is accessible"
          else
            echo "⚠️  Public URL not accessible (may be expected if nginx not configured)"
          fi

          echo "🎉 All health checks passed!"

      - name: Cleanup and finalize deployment
        if: success()
        run: |
          echo "🧹 Cleaning up and finalizing deployment"

          ssh -i ~/.ssh/prod_key ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }} '
            set -e
            cd ~/skill-tree-survey

            echo "🏷️  Tagging successful deployment"
            # Tag the successful images for easy identification
            docker tag skill-survey-backend:${{ needs.build-images.outputs.image-tag }} skill-survey-backend:prod-latest
            docker tag skill-survey-frontend:${{ needs.build-images.outputs.image-tag }} skill-survey-frontend:prod-latest

            echo "🧹 Cleaning up old Docker images"
            # Remove images older than current and prod-latest (keep for rollback)
            docker image prune -f

            # Remove untagged images but keep last 2 versions
            docker images --format "table {{.Repository}}\t{{.Tag}}\t{{.ID}}" | \
              grep "skill-survey-" | grep -v "prod-latest" | grep -v "${{ needs.build-images.outputs.image-tag }}" | \
              tail -n +3 | awk "{print \$3}" | xargs -r docker rmi -f 2>/dev/null || true

            echo "📊 Current image status:"
            docker images | grep "skill-survey" || echo "No skill-survey images found"

            echo "💾 Updating deployment metadata"
            cat >> .env << EOF
          DEPLOYMENT_STATUS=success
          HEALTH_CHECK_PASSED=true
          DEPLOYMENT_COMPLETED_AT=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          EOF

            echo "✅ Deployment finalized successfully"
          '

          # Clean up local artifacts
          rm -f backend-${{ needs.build-images.outputs.image-tag }}.tar.gz frontend-${{ needs.build-images.outputs.image-tag }}.tar.gz
          echo "🧹 Local artifacts cleaned up"

      - name: Rollback on failure
        if: failure()
        run: |
          echo "🔄 Deployment failed, initiating rollback"

          ssh -i ~/.ssh/prod_key ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }} '
            set -e
            cd ~/skill-tree-survey
            source /tmp/deployment_vars.env

            echo "📋 Loading rollback information"
            if [ -f "${BACKUP_DIR}/rollback_info.txt" ]; then
              source "${BACKUP_DIR}/rollback_info.txt"

              echo "🔄 Rolling back to previous deployment"

              # Stop current failed deployment
              docker-compose -f docker-compose.prod.yml down --remove-orphans

              # Restore previous environment
              if [ -f "${BACKUP_DIR}/.env.backup" ]; then
                cp "${BACKUP_DIR}/.env.backup" .env
                echo "✅ Environment restored"
              fi

              # Restore previous docker-compose file
              if [ -f "${BACKUP_DIR}/docker-compose.prod.yml.backup" ]; then
                cp "${BACKUP_DIR}/docker-compose.prod.yml.backup" docker-compose.prod.yml
                echo "✅ Docker compose file restored"
              fi

              # Start with previous images if they exist
              if [ "$BACKEND_IMAGE_ID" != "none" ] && [ "$FRONTEND_IMAGE_ID" != "none" ]; then
                echo "🚀 Restarting with previous images"
                docker-compose -f docker-compose.prod.yml up -d

                # Quick health check
                sleep 15
                if curl -f http://localhost:8000/health > /dev/null 2>&1; then
                  echo "✅ Rollback successful - service is healthy"
                else
                  echo "⚠️  Rollback completed but service may need manual intervention"
                fi
              else
                echo "⚠️  No previous deployment found, manual intervention required"
              fi
            else
              echo "❌ No rollback information found"
            fi

            # Clean up failed deployment images
            docker image prune -f
            echo "🧹 Failed deployment artifacts cleaned up"
          '

      - name: Create deployment summary
        if: always()
        run: |
          echo "## 📋 Production Environment Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: PRODUCTION" >> $GITHUB_STEP_SUMMARY
          echo "- **Image Tag**: ${{ needs.build-images.outputs.image-tag }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployed by**: @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Timestamp**: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ job.status }}" = "success" ]; then
            echo "### ✅ Deployment Successful!" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Health Checks Completed:**" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ Backend health endpoint" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ Frontend accessibility" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ API endpoints (/api/questions/base)" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ CORS configuration" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ Frontend-backend integration" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Production URL**: https://skills-survey.heal.engineering" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ❌ Deployment Failed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Rollback Status**: Attempted" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Troubleshooting:**" >> $GITHUB_STEP_SUMMARY
            echo "- Check container logs: \`docker-compose -f docker-compose.prod.yml logs\`" >> $GITHUB_STEP_SUMMARY
            echo "- Verify environment variables are correctly set" >> $GITHUB_STEP_SUMMARY
            echo "- Ensure production instance has sufficient resources" >> $GITHUB_STEP_SUMMARY
          fi