name: Build and Push Image

# Push to main builds the backend image and publishes it to GHCR. Watchtower on the
# EC2 polls GHCR (:latest) and auto-updates the running container within ~5 minutes.
on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/build-and-push.yml'
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: skill-tree-survey-api

jobs:
  build:
    # arm64 runner — the prod EC2 is a t4g (Graviton/arm64) instance.
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Compute image refs
        id: meta
        run: |
          REPO_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE="${{ env.REGISTRY }}/${REPO_OWNER}/${{ env.IMAGE_NAME }}"
          {
            echo "image=${IMAGE}"
            echo "image_sha=${IMAGE}:prod-${{ github.sha }}"
            echo "image_latest=${IMAGE}:latest"
            echo "build_start=$(date +%s)"
          } >> "$GITHUB_OUTPUT"
          echo "📦 ${IMAGE} (latest + prod-${{ github.sha }})"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push backend image (linux/arm64)
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: runtime
          platforms: linux/arm64
          push: true
          tags: |
            ${{ steps.meta.outputs.image_latest }}
            ${{ steps.meta.outputs.image_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}

      - name: Verify image is present at GHCR
        run: |
          IMAGE_REF="${{ steps.meta.outputs.image_sha }}"
          echo "🔎 Inspecting ${IMAGE_REF}..."
          if ! docker buildx imagetools inspect "${IMAGE_REF}" >/dev/null 2>&1; then
            echo "❌ Image not found at ${IMAGE_REF} after push."
            exit 1
          fi
          echo "✅ Image present at GHCR"

      - name: Build summary
        if: always()
        run: |
          BUILD_START="${{ steps.meta.outputs.build_start }}"
          DURATION="?"; [ -n "$BUILD_START" ] && DURATION="$(( $(date +%s) - BUILD_START ))s"
          {
            echo "## 🏗️ Build Summary"
            echo ""
            echo "- **Status**: \`${{ job.status }}\`"
            echo "- **Image (latest)**: \`${{ steps.meta.outputs.image_latest }}\`"
            echo "- **Image (SHA)**: \`${{ steps.meta.outputs.image_sha }}\`"
            echo "- **Digest**: \`${{ steps.build.outputs.digest || 'n/a' }}\`"
            echo "- **Commit**: \`${{ github.sha }}\`"
            echo "- **Duration**: ${DURATION}"
          } >> "$GITHUB_STEP_SUMMARY"
