name: Deploy to Test Environment

on:
  workflow_dispatch:
    inputs:
      deployment_message:
        description: 'Deployment message/reason'
        required: false
        default: 'Test environment deployment'
  push:
    branches:
      - develop

jobs:
  deploy:
    name: Deploy to Test Environment
    runs-on: ubuntu-latest
    environment:
      name: test
      url: https://test-skills-survey.heal.engineering

    steps:
    - name: Deploy to TEST EC2
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.TEST_EC2_HOST }}
        username: ${{ secrets.TEST_EC2_USERNAME }}
        key: ${{ secrets.TEST_EC2_SSH_KEY }}
        port: ${{ secrets.TEST_EC2_PORT || 22 }}
        timeout: 15m
        script: |
          #!/bin/bash
          set -e

          echo "🚀 Starting test deployment..."
          cd ~/skill-tree-survey || cd /home/${{ secrets.TEST_EC2_USERNAME }}/skill-tree-survey

          # Configure git to use HTTPS with token
          git remote set-url origin https://${{ secrets.GH_DEPLOY_TOKEN }}@github.com/HEAL-Engineering/skill-tree-survey.git

          # Pull latest code
          echo "📥 Pulling latest code from develop..."
          git fetch origin develop
          git reset --hard origin/develop

          # Update environment file
          echo "📝 Setting up environment..."
          cat > .env << 'EOF'
          ADMIN_PASSWORD=${{ secrets.TEST_ADMIN_PASSWORD }}
          DATABASE_URL=sqlite:////app/data/skill_survey_test.db
          CORS_ORIGINS=${{ secrets.TEST_CORS_ORIGINS }}
          SEED_ON_STARTUP=true
          ENVIRONMENT=test
          VITE_API_URL=${{ secrets.TEST_VITE_API_URL }}
          EOF

          # Backup current images for rollback
          echo "🔄 Creating backup images for rollback..."
          docker tag test-skill-survey-backend:latest test-skill-survey-backend:rollback 2>/dev/null || true
          docker tag test-skill-survey-frontend:latest test-skill-survey-frontend:rollback 2>/dev/null || true

          # Build new ARM64 images locally
          echo "🔨 Building ARM64 images..."
          docker build --platform linux/arm64 -f backend/Dockerfile -t test-skill-survey-backend:latest ./backend
          docker build --platform linux/arm64 -f frontend/Dockerfile -t test-skill-survey-frontend:latest ./frontend

          # Deploy with new images
          echo "🚀 Deploying new containers..."
          docker-compose -f docker-compose.test.yml down 2>/dev/null || true
          docker-compose -f docker-compose.test.yml up -d

          # Health check with retries
          echo "⏳ Waiting for services to start..."
          sleep 10

          # Check backend health with retries
          echo -n "Checking backend health"
          max_attempts=30
          attempt=1
          backend_healthy=false

          while [ $attempt -le $max_attempts ]; do
            if curl -sf http://localhost:8000/health >/dev/null 2>&1; then
              echo " ✅"
              backend_healthy=true
              break
            fi
            echo -n "."
            sleep 2
            attempt=$((attempt + 1))
          done

          if [ "$backend_healthy" = false ]; then
            echo " ❌"
            echo "Backend health check failed after $max_attempts attempts"
            echo "Container logs:"
            docker logs test-skill-survey-backend --tail 50

            # Rollback
            echo "🔄 Rolling back to previous version..."
            docker-compose -f docker-compose.test.yml down
            docker tag test-skill-survey-backend:rollback test-skill-survey-backend:latest 2>/dev/null || true
            docker tag test-skill-survey-frontend:rollback test-skill-survey-frontend:latest 2>/dev/null || true
            docker-compose -f docker-compose.test.yml up -d
            echo "❌ Deployment failed and rolled back"
            exit 1
          fi

          # Check frontend health
          echo -n "Checking frontend health"
          frontend_healthy=false
          attempt=1

          while [ $attempt -le $max_attempts ]; do
            if curl -sf http://localhost:8080 >/dev/null 2>&1; then
              echo " ✅"
              frontend_healthy=true
              break
            fi
            echo -n "."
            sleep 2
            attempt=$((attempt + 1))
          done

          if [ "$frontend_healthy" = false ]; then
            echo " ❌"
            echo "Frontend health check failed after $max_attempts attempts"
            echo "Container logs:"
            docker logs test-skill-survey-frontend --tail 50

            # Rollback
            echo "🔄 Rolling back to previous version..."
            docker-compose -f docker-compose.test.yml down
            docker tag test-skill-survey-backend:rollback test-skill-survey-backend:latest 2>/dev/null || true
            docker tag test-skill-survey-frontend:rollback test-skill-survey-frontend:latest 2>/dev/null || true
            docker-compose -f docker-compose.test.yml up -d
            echo "❌ Deployment failed and rolled back"
            exit 1
          fi

          echo "✅ Test deployment successful!"
          echo "📊 Current status:"
          docker-compose -f docker-compose.test.yml ps

          # Clean up old images
          echo "🧹 Cleaning up old images..."
          docker image prune -f