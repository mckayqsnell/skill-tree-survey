name: Deploy to Test Environment

on:
  workflow_dispatch:
    inputs:
      deployment_message:
        description: 'Deployment message/reason'
        required: false
        default: 'Test environment deployment'
      skip_health_check:
        description: 'Skip health checks (use with caution)'
        required: false
        type: boolean
        default: false
  push:
    branches:
      - develop

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  deploy:
    name: Deploy to Test Environment
    runs-on: ubuntu-latest
    environment:
      name: test
      url: https://test-skills-survey.heal.engineering

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Log deployment start
      run: |
        echo "🚀 Starting test environment deployment"
        echo "Initiated by: ${{ github.actor }}"
        echo "Deployment message: ${{ github.event.inputs.deployment_message || 'Automatic deployment from develop branch' }}"
        echo "Commit: ${{ github.sha }}"
        echo "Timestamp: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
        echo "Branch: ${{ github.ref_name }}"

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Configure AWS credentials
      if: vars.USE_AWS_ECR == 'true'
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

    - name: Login to AWS ECR
      if: vars.USE_AWS_ECR == 'true'
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Set Docker registry
      id: registry
      run: |
        if [ "${{ vars.USE_AWS_ECR }}" == "true" ]; then
          echo "registry=${{ steps.login-ecr.outputs.registry }}" >> $GITHUB_OUTPUT
        else
          echo "registry=docker.io" >> $GITHUB_OUTPUT
        fi

    - name: Build and tag Docker images locally
      run: |
        echo "🔨 Building test environment Docker images..."

        # Build backend
        docker build \
          -f backend/Dockerfile.prod \
          -t test-skill-survey-backend:latest \
          -t test-skill-survey-backend:test-${{ github.sha }} \
          ./backend

        # Build frontend with test API URL
        docker build \
          -f frontend/Dockerfile.prod \
          -t test-skill-survey-frontend:latest \
          -t test-skill-survey-frontend:test-${{ github.sha }} \
          --build-arg VITE_API_URL="${{ secrets.TEST_VITE_API_URL }}" \
          ./frontend

        echo "✅ Docker images built successfully"

    - name: Save Docker images as tar files
      run: |
        echo "💾 Saving Docker images for transfer..."

        # Save Docker images directly to workspace root
        docker save test-skill-survey-backend:latest test-skill-survey-backend:test-${{ github.sha }} \
          -o backend-test-images.tar
        docker save test-skill-survey-frontend:latest test-skill-survey-frontend:test-${{ github.sha }} \
          -o frontend-test-images.tar

        # Compress the tar files
        gzip backend-test-images.tar
        gzip frontend-test-images.tar

        # Show file sizes and permissions
        echo "Docker images ready for transfer:"
        ls -lh *-test-images.tar.gz

        # Ensure files are readable
        chmod 644 *-test-images.tar.gz

    - name: Copy Docker images to TEST EC2
      uses: appleboy/scp-action@v0.1.5
      with:
        host: ${{ secrets.TEST_EC2_HOST }}
        username: ${{ secrets.TEST_EC2_USERNAME }}
        key: ${{ secrets.TEST_EC2_SSH_KEY }}
        port: ${{ secrets.TEST_EC2_PORT || 22 }}
        source: "backend-test-images.tar.gz,frontend-test-images.tar.gz"
        target: "/tmp"
        timeout: 10m

    - name: Deploy to TEST EC2
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.TEST_EC2_HOST }}
        username: ${{ secrets.TEST_EC2_USERNAME }}
        key: ${{ secrets.TEST_EC2_SSH_KEY }}
        port: ${{ secrets.TEST_EC2_PORT || 22 }}
        timeout: 10m
        script: |
          set -e

          echo "📦 Preparing for test deployment..."
          cd /tmp

          # Backup current running images for rollback
          echo "🔄 Backing up current test images for potential rollback..."

          # Get the image IDs of currently running containers
          CURRENT_BACKEND_IMAGE=$(docker inspect test-skill-survey-backend --format='{{.Image}}' 2>/dev/null || echo "none")
          CURRENT_FRONTEND_IMAGE=$(docker inspect test-skill-survey-frontend --format='{{.Image}}' 2>/dev/null || echo "none")

          if [ "$CURRENT_BACKEND_IMAGE" != "none" ]; then
            # Tag current images as rollback
            docker tag test-skill-survey-backend:latest test-skill-survey-backend:rollback 2>/dev/null || true
            docker tag test-skill-survey-frontend:latest test-skill-survey-frontend:rollback 2>/dev/null || true
            echo "✅ Current test images backed up with :rollback tag"
          else
            echo "ℹ️ No existing test deployment found, skipping backup"
          fi

          # Load new images
          echo "📦 Loading new Docker images for test environment..."
          gunzip -f backend-test-images.tar.gz frontend-test-images.tar.gz

          # Remove current :latest tags to ensure clean replacement
          echo "Preparing to replace current test images..."
          # Force remove old images to ensure fresh deployment
          docker rmi -f test-skill-survey-backend:latest test-skill-survey-frontend:latest 2>/dev/null || true

          # Load new images
          docker load -i backend-test-images.tar
          docker load -i frontend-test-images.tar

          # Clean up tar files
          rm -f backend-test-images.tar frontend-test-images.tar

          echo "✅ New test images loaded and ready for deployment"

          echo "📝 Creating test environment file..."
          cd ~/skill-tree-survey || cd /home/${{ secrets.TEST_EC2_USERNAME }}/skill-tree-survey || cd /opt/skill-tree-survey

          # Backup current .env if it exists
          if [ -f .env ]; then
            cp .env .env.backup.$(date +%Y%m%d_%H%M%S)
            echo "📋 Backed up existing .env file"
          fi

          # Create new .env file (Docker Compose will automatically read this)
          cat > .env << 'EOF'
          # Backend Configuration
          ADMIN_PASSWORD=${{ secrets.TEST_ADMIN_PASSWORD }}
          DATABASE_URL=sqlite:////app/data/skill_survey_test.db
          CORS_ORIGINS=${{ secrets.TEST_CORS_ORIGINS }}
          SEED_ON_STARTUP=true
          ENVIRONMENT=test

          # Frontend Configuration
          VITE_API_URL=${{ secrets.TEST_VITE_API_URL }}
          EOF

          # Images are already tagged correctly, no need for additional tagging
          echo "✅ Images are properly tagged for docker-compose"

          echo "🔄 Updating docker-compose test services..."

          # Check current running services
          docker-compose -f docker-compose.test.yml ps 2>/dev/null || true

          # Stop and remove old containers (including volumes for fresh state)
          echo "Stopping old test containers..."
          docker-compose -f docker-compose.test.yml down --volumes --remove-orphans

          # Pull images (will use local ones we just loaded)
          echo "Using freshly built images..."

          # Start new containers with the pre-built images
          echo "Starting new test containers..."
          docker-compose -f docker-compose.test.yml up -d --force-recreate

          # Wait for services to be ready
          echo "⏳ Waiting for test services to start..."
          sleep 20

          # Check if skip health check is enabled
          if [ "${{ github.event.inputs.skip_health_check }}" != "true" ]; then
            echo "🏥 Running test environment health checks..."

            # Health check for backend
            max_attempts=15
            attempt=1
            while [ $attempt -le $max_attempts ]; do
              if curl -f http://localhost:8000/health; then
                echo "✅ Test backend is healthy"
                break
              fi

              if [ $attempt -eq $max_attempts ]; then
                echo "❌ Test backend health check failed"
                docker-compose -f docker-compose.test.yml logs --tail=50 backend
                exit 1
              fi

              echo "Waiting for test backend... (attempt $attempt/$max_attempts)"
              sleep 5
              attempt=$((attempt + 1))
            done

            # Health check for frontend
            attempt=1
            while [ $attempt -le $max_attempts ]; do
              if curl -f http://localhost:8080; then
                echo "✅ Test frontend is accessible"
                break
              fi

              if [ $attempt -eq $max_attempts ]; then
                echo "❌ Test frontend health check failed"
                docker-compose -f docker-compose.test.yml logs --tail=50 frontend
                exit 1
              fi

              echo "Waiting for test frontend... (attempt $attempt/$max_attempts)"
              sleep 5
              attempt=$((attempt + 1))
            done

            # Final check through nginx if configured
            if curl -f https://test-skills-survey.heal.engineering/api/health 2>/dev/null; then
              echo "✅ Test application is accessible via public URL"
            else
              echo "⚠️  Could not verify test public URL (this might be expected if nginx is configured separately)"
            fi
          else
            echo "⚠️  Health checks skipped by user request"
          fi

          # Clean up old Docker images to save space (but keep rollback images)
          echo "🧹 Cleaning up old Docker images..."

          # Remove old tagged images (keep only latest and rollback)
          echo "Removing old test image versions (keeping :latest and :rollback)..."
          docker images --format "{{.Repository}}:{{.Tag}}" | grep -E "(test-skill-survey|skill-survey)-(backend|frontend):" | grep -v -E ":(latest|rollback|test-latest)" | xargs -r docker rmi 2>/dev/null || true

          # Remove dangling images
          docker image prune -f

          # Optional: More aggressive cleanup (commented out by default)
          # docker system prune -af --volumes --filter "until=24h"

          echo "Disk space after cleanup:"
          df -h /var/lib/docker

          # Show final status
          echo "📊 Test deployment complete! Current status:"
          docker-compose -f docker-compose.test.yml ps

          echo ""
          echo "🔄 Rollback images available:"
          docker images | grep -E "test-skill-survey-(backend|frontend):rollback" || echo "No rollback images found"

          echo ""
          echo "✅ Test environment deployment successful!"
          echo "ℹ️ To rollback: docker-compose down && docker tag test-skill-survey-backend:rollback test-skill-survey-backend:latest && docker tag test-skill-survey-frontend:rollback test-skill-survey-frontend:latest && docker-compose up -d"

    - name: Verify test deployment
      if: github.event.inputs.skip_health_check != 'true'
      run: |
        echo "🔍 Verifying test deployment from GitHub Actions..."
        max_attempts=5
        attempt=1

        while [ $attempt -le $max_attempts ]; do
          # Test the health endpoint at the root level
          if curl -f -k https://test-skills-survey.heal.engineering/health 2>/dev/null || \
             curl -f -k https://test-skills-survey.heal.engineering/api/health 2>/dev/null; then
            echo "✅ Test environment deployment verified successfully!"
            break
          fi

          if [ $attempt -eq $max_attempts ]; then
            echo "⚠️  Could not verify test URL from GitHub Actions"
            echo "This might be due to network restrictions. Please verify manually."
          fi

          echo "Verification attempt $attempt/$max_attempts..."
          sleep 10
          attempt=$((attempt + 1))
        done

    - name: Create deployment summary
      if: always()
      run: |
        echo "## 📋 Test Environment Deployment Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 🏷️ Environment: TEST" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Deployed by**: @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Deployment message**: ${{ github.event.inputs.deployment_message || 'Automatic deployment from develop branch' }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Commit**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
        echo "- **Branch**: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
        echo "- **Timestamp**: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
        echo "- **Test URL**: https://test-skills-survey.heal.engineering" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        if [ "${{ job.status }}" == "success" ]; then
          echo "### ✅ Test deployment successful!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The application has been successfully deployed to the test environment." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### Next Steps:" >> $GITHUB_STEP_SUMMARY
          echo "- Verify functionality at https://test-skills-survey.heal.engineering" >> $GITHUB_STEP_SUMMARY
          echo "- Run smoke tests" >> $GITHUB_STEP_SUMMARY
          echo "- Check application logs if needed" >> $GITHUB_STEP_SUMMARY
        else
          echo "### ❌ Test deployment failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Please check the logs for more information." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### Troubleshooting:" >> $GITHUB_STEP_SUMMARY
          echo "- Review the workflow logs above" >> $GITHUB_STEP_SUMMARY
          echo "- Check Docker container logs on the test server" >> $GITHUB_STEP_SUMMARY
          echo "- Verify environment variables and secrets are configured correctly" >> $GITHUB_STEP_SUMMARY
        fi

    - name: Send deployment notification
      if: always()
      uses: actions/github-script@v7
      with:
        script: |
          const status = '${{ job.status }}';
          const emoji = status === 'success' ? '✅' : '❌';
          const environment = 'test';

          // Create a deployment status
          await github.rest.repos.createDeploymentStatus({
            owner: context.repo.owner,
            repo: context.repo.repo,
            deployment_id: context.payload.deployment?.id || 1,
            state: status === 'success' ? 'success' : 'failure',
            environment: environment,
            environment_url: 'https://test-skills-survey.heal.engineering',
            description: `Test deployment ${status}`,
          }).catch(() => {
            console.log('Could not create deployment status (deployment might not exist)');
          });

          // Log deployment event
          console.log(`${emoji} Test environment deployment ${status} for commit ${context.sha}`);

  rollback:
    name: Test Environment Rollback Option
    runs-on: ubuntu-latest
    needs: deploy
    if: failure()

    steps:
    - name: Test rollback instructions
      run: |
        echo "❌ Test deployment failed. To rollback:"
        echo ""
        echo "### Manual Rollback Steps:"
        echo "1. SSH into the TEST EC2 instance"
        echo "2. Navigate to the project directory (usually /opt/skill-tree-survey)"
        echo "3. Stop current containers: docker-compose -f docker-compose.test.yml down"
        echo "4. Restore previous .env from backup:"
        echo "   - List backups: ls -la .env.backup.*"
        echo "   - Restore: cp .env.backup.YYYYMMDD_HHMMSS .env"
        echo "5. Load previous Docker images or pull from registry"
        echo "6. Start services: docker-compose -f docker-compose.test.yml up -d"
        echo "7. Verify services: docker-compose -f docker-compose.test.yml ps"
        echo ""
        echo "### Alternative: Deploy Previous Version"
        echo "Run this workflow again with a previous known-good commit"