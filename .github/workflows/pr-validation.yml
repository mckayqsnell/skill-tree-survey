name: PR Validation

on:
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'frontend/**'
      - 'backend/**'
      - 'docker-compose*.yml'
      - 'Dockerfile*'
      - '.github/workflows/pr-validation.yml'

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      with:
        driver-opts: network=host

    - name: Cache Docker layers
      uses: actions/cache@v3
      with:
        path: /tmp/.buildx-cache
        key: ${{ runner.os }}-buildx-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-buildx-

    - name: Build Backend Docker Image
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        file: ./backend/Dockerfile.prod
        push: false
        tags: skill-survey-backend:pr-${{ github.event.pull_request.number }}
        cache-from: type=local,src=/tmp/.buildx-cache
        cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max
        build-args: |
          BUILDKIT_PROGRESS=plain

    - name: Build Frontend Docker Image
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        file: ./frontend/Dockerfile.prod
        push: false
        tags: skill-survey-frontend:pr-${{ github.event.pull_request.number }}
        cache-from: type=local,src=/tmp/.buildx-cache
        cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max
        build-args: |
          VITE_API_URL=http://localhost:8000
          BUILDKIT_PROGRESS=plain

    - name: Test Docker Compose Configuration
      run: |
        docker compose -f docker-compose.test.yml config -q
        if [ $? -eq 0 ]; then
          echo "✅ Docker Compose configuration is valid"
        else
          echo "❌ Docker Compose configuration is invalid"
          exit 1
        fi

    - name: Start Services with Docker Compose
      run: |
        # Start services using the test compose file
        docker compose -f docker-compose.test.yml up -d

        # Wait for services to be healthy
        echo "Waiting for services to start..."
        sleep 30

    - name: Health Check - Backend
      run: |
        max_attempts=10
        attempt=1
        
        while [ $attempt -le $max_attempts ]; do
          echo "Attempt $attempt of $max_attempts"
          
          if curl -f http://localhost:8000/health; then
            echo "✅ Backend is healthy"
            break
          fi
          
          if [ $attempt -eq $max_attempts ]; then
            echo "❌ Backend health check failed after $max_attempts attempts"
            docker compose -f docker-compose.test.yml logs backend
            exit 1
          fi
          
          sleep 5
          attempt=$((attempt + 1))
        done

    - name: Health Check - Frontend
      run: |
        max_attempts=10
        attempt=1
        
        while [ $attempt -le $max_attempts ]; do
          echo "Attempt $attempt of $max_attempts"
          
          if curl -f http://localhost:8080; then
            echo "✅ Frontend is accessible"
            break
          fi
          
          if [ $attempt -eq $max_attempts ]; then
            echo "❌ Frontend health check failed after $max_attempts attempts"
            docker compose -f docker-compose.test.yml logs frontend
            exit 1
          fi
          
          sleep 5
          attempt=$((attempt + 1))
        done

    - name: API Endpoint Tests
      run: |
        # Test base questions endpoint
        echo "Testing /api/questions/base endpoint..."
        response=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/api/questions/base)
        if [ "$response" = "200" ]; then
          echo "✅ Base questions endpoint is working"
        else
          echo "❌ Base questions endpoint returned $response"
          exit 1
        fi
        
        # Test health endpoint
        echo "Testing /health endpoint..."
        response=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/health)
        if [ "$response" = "200" ]; then
          echo "✅ Health endpoint is working"
        else
          echo "❌ Health endpoint returned $response"
          exit 1
        fi

    - name: Cleanup
      if: always()
      run: |
        docker compose -f docker-compose.test.yml down -v || true
        
        # Move cache to preserve it
        rm -rf /tmp/.buildx-cache
        mv /tmp/.buildx-cache-new /tmp/.buildx-cache || true

    - name: Comment PR Status
      if: always()
      uses: actions/github-script@v7
      with:
        script: |
          const outcome = '${{ job.status }}';
          const emoji = outcome === 'success' ? '✅' : '❌';
          const status = outcome === 'success' ? 'passed' : 'failed';
          
          const comment = `## ${emoji} Build Validation ${status}
          
          **Workflow:** PR Validation
          **Status:** ${outcome}
          **Commit:** ${{ github.event.pull_request.head.sha }}
          
          ${outcome === 'success' 
            ? '### All checks passed!\n- ✅ Backend Docker image built successfully\n- ✅ Frontend Docker image built successfully\n- ✅ Services started successfully\n- ✅ Health checks passed\n- ✅ API endpoints responding'
            : '### Build or tests failed\nPlease check the workflow logs for details.'}
          `;
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: comment
          });