name: PR Validation

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'frontend/**'
      - 'backend/**'
      - 'docker-compose*.yml'
      - 'Dockerfile*'
      - '.github/workflows/**'

jobs:
  build-and-test:
    uses: ./.github/workflows/build-and-cache.yml
    secrets: inherit

  simulate-deployment:
    needs: build-and-test
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download built images
        uses: actions/download-artifact@v4
        with:
          name: docker-images-${{ needs.build-and-test.outputs.image-tag }}

      - name: Load and test images locally
        run: |
          # Load images
          docker load < backend-${{ needs.build-and-test.outputs.image-tag }}.tar.gz
          docker load < frontend-${{ needs.build-and-test.outputs.image-tag }}.tar.gz

          # Create test environment
          cat > .env.test << EOF
          ADMIN_PASSWORD=test-password
          DATABASE_URL=sqlite:////app/data/skill_survey_test.db
          CORS_ORIGINS=["http://localhost:8080"]
          VITE_API_URL=http://localhost:8000
          EOF

          # Start services with PR images
          export IMAGE_TAG=${{ needs.build-and-test.outputs.image-tag }}
          docker-compose -f docker-compose.test.yml up -d

          # Wait for health checks
          sleep 30

      - name: Run health checks
        run: |
          max_attempts=10
          attempt=1

          # Backend health check
          while [ $attempt -le $max_attempts ]; do
            if curl -f http://localhost:8000/health; then
              echo "✅ Backend healthy"
              break
            fi
            if [ $attempt -eq $max_attempts ]; then
              echo "❌ Backend health check failed"
              docker-compose -f docker-compose.test.yml logs backend
              exit 1
            fi
            sleep 5
            attempt=$((attempt + 1))
          done

          # Frontend health check  
          attempt=1
          while [ $attempt -le $max_attempts ]; do
            if curl -f http://localhost:8080; then
              echo "✅ Frontend accessible"
              break
            fi
            if [ $attempt -eq $max_attempts ]; then
              echo "❌ Frontend health check failed"
              docker-compose -f docker-compose.test.yml logs frontend
              exit 1
            fi
            sleep 5
            attempt=$((attempt + 1))
          done

      - name: API endpoint tests
        run: |
          # Test API endpoints
          curl -f http://localhost:8000/api/questions/base || exit 1
          echo "✅ API endpoints working"

      - name: Cleanup
        if: always()
        run: |
          # Stop services
          docker-compose -f docker-compose.test.yml down -v
          
          # Remove test images
          docker rmi skill-survey-backend:${{ needs.build-and-test.outputs.image-tag }} 2>/dev/null || true
          docker rmi skill-survey-frontend:${{ needs.build-and-test.outputs.image-tag }} 2>/dev/null || true
          
          # Remove downloaded artifacts
          rm -f backend-${{ needs.build-and-test.outputs.image-tag }}.tar.gz 2>/dev/null || true
          rm -f frontend-${{ needs.build-and-test.outputs.image-tag }}.tar.gz 2>/dev/null || true
          
          # Comprehensive cleanup
          docker system prune -f
          docker images -f "dangling=true" -q | xargs -r docker rmi 2>/dev/null || true
          
          echo "🧹 PR validation cleanup completed"