name: Build and Cache Images

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_call:
    outputs:
      image-tag:
        description: "Generated image tag for the build"
        value: ${{ jobs.build.outputs.image-tag }}

jobs:
  build:
    runs-on: self-hosted
    outputs:
      image-tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate image metadata
        id: meta
        run: |
          # Generate consistent image tags based on context
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            TAG="pr-${{ github.event.pull_request.number }}-${{ github.event.pull_request.head.sha }}"
          elif [ "${{ github.ref }}" = "refs/heads/develop" ]; then
            TAG="test-${{ github.sha }}"
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            TAG="prod-${{ github.sha }}"
          else
            TAG="dev-${{ github.sha }}"
          fi
          
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Generated tag: $TAG"
          
          # Log build context
          echo "Build context:"
          echo "  Event: ${{ github.event_name }}"
          echo "  Branch: ${{ github.ref_name }}"
          echo "  Commit: ${{ github.sha }}"
          echo "  Tag: $TAG"

      - name: Pre-build cleanup
        run: |
          echo "🧹 Pre-build cleanup"
          
          # Clean up any previous build artifacts
          rm -f *.tar.gz 2>/dev/null || true
          
          # Prune unused Docker resources to free up space
          docker system prune -f
          
          # Show available disk space
          echo "Available disk space:"
          df -h /

      - name: Build backend image
        run: |
          echo "🔨 Building backend image"
          
          # Build backend with specific tag
          docker build \
            -f backend/Dockerfile.prod \
            -t skill-survey-backend:${{ steps.meta.outputs.tag }} \
            --label "build.commit=${{ github.sha }}" \
            --label "build.branch=${{ github.ref_name }}" \
            --label "build.timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            ./backend
          
          echo "✅ Backend image built successfully"

      - name: Build frontend image
        run: |
          echo "🔨 Building frontend image"
          
          # Determine API URL based on environment
          if [[ "${{ steps.meta.outputs.tag }}" == test-* ]]; then
            API_URL="${{ secrets.TEST_VITE_API_URL || 'https://test-skills-survey.heal.engineering' }}"
            echo "Using TEST API URL: $API_URL"
          elif [[ "${{ steps.meta.outputs.tag }}" == prod-* ]]; then
            API_URL="${{ secrets.VITE_API_URL || 'https://skills-survey.heal.engineering' }}"
            echo "Using PROD API URL: $API_URL"
          else
            API_URL="http://localhost:8000"  # PR/dev builds
            echo "Using DEV API URL: $API_URL"
          fi
          
          # Build frontend with environment-specific API URL
          docker build \
            -f frontend/Dockerfile.prod \
            -t skill-survey-frontend:${{ steps.meta.outputs.tag }} \
            --build-arg VITE_API_URL="$API_URL" \
            --label "build.commit=${{ github.sha }}" \
            --label "build.branch=${{ github.ref_name }}" \
            --label "build.timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --label "build.api_url=$API_URL" \
            ./frontend
          
          echo "✅ Frontend image built successfully"

      - name: Verify image integrity
        run: |
          echo "🔍 Verifying built images"
          
          # Verify images exist and show basic info
          if docker image inspect skill-survey-backend:${{ steps.meta.outputs.tag }} > /dev/null 2>&1; then
            echo "✅ Backend image exists"
            backend_size=$(docker image inspect skill-survey-backend:${{ steps.meta.outputs.tag }} --format '{{.Size}}' | numfmt --to=iec --suffix=B)
            echo "  Size: $backend_size"
          else
            echo "❌ Backend image verification failed"
            exit 1
          fi
          
          if docker image inspect skill-survey-frontend:${{ steps.meta.outputs.tag }} > /dev/null 2>&1; then
            echo "✅ Frontend image exists"
            frontend_size=$(docker image inspect skill-survey-frontend:${{ steps.meta.outputs.tag }} --format '{{.Size}}' | numfmt --to=iec --suffix=B)
            echo "  Size: $frontend_size"
          else
            echo "❌ Frontend image verification failed"
            exit 1
          fi
          
          echo "🎯 Image verification completed"

      - name: Export images for deployment
        run: |
          echo "📦 Exporting images for deployment"
          
          # Export images with compression
          echo "Exporting backend image..."
          docker save skill-survey-backend:${{ steps.meta.outputs.tag }} | gzip -9 > backend-${{ steps.meta.outputs.tag }}.tar.gz
          
          echo "Exporting frontend image..."
          docker save skill-survey-frontend:${{ steps.meta.outputs.tag }} | gzip -9 > frontend-${{ steps.meta.outputs.tag }}.tar.gz
          
          # Show export file sizes
          echo "📊 Export file sizes:"
          ls -lh *-${{ steps.meta.outputs.tag }}.tar.gz
          
          # Verify integrity of exported files
          if [ ! -f "backend-${{ steps.meta.outputs.tag }}.tar.gz" ] || [ ! -s "backend-${{ steps.meta.outputs.tag }}.tar.gz" ]; then
            echo "❌ Backend export failed or is empty"
            exit 1
          fi
          
          if [ ! -f "frontend-${{ steps.meta.outputs.tag }}.tar.gz" ] || [ ! -s "frontend-${{ steps.meta.outputs.tag }}.tar.gz" ]; then
            echo "❌ Frontend export failed or is empty"
            exit 1
          fi
          
          echo "✅ Images exported successfully"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: docker-images-${{ steps.meta.outputs.tag }}
          path: |
            backend-${{ steps.meta.outputs.tag }}.tar.gz
            frontend-${{ steps.meta.outputs.tag }}.tar.gz
          retention-days: 7
          compression-level: 0  # Files are already compressed

      - name: Post-build cleanup
        if: always()
        run: |
          echo "🧹 Post-build cleanup"
          
          # Remove exported tar files (now in artifacts)
          rm -f backend-${{ steps.meta.outputs.tag }}.tar.gz frontend-${{ steps.meta.outputs.tag }}.tar.gz
          echo "✅ Exported files cleaned up"
          
          # Remove the built images from local Docker (save space)
          docker rmi skill-survey-backend:${{ steps.meta.outputs.tag }} 2>/dev/null || true
          docker rmi skill-survey-frontend:${{ steps.meta.outputs.tag }} 2>/dev/null || true
          echo "✅ Build images removed from local Docker"
          
          # Aggressive cleanup - remove all build caches and unused images
          docker builder prune -f 2>/dev/null || true
          docker image prune -f 2>/dev/null || true
          docker container prune -f 2>/dev/null || true
          
          # Remove dangling images
          docker images -f "dangling=true" -q | xargs -r docker rmi 2>/dev/null || true
          
          echo "✅ Docker cleanup completed"
          
          # Show final disk usage
          echo "📊 Final disk usage:"
          df -h /
          
          echo "🎯 Build process completed cleanly"

      - name: Build summary
        if: always()
        run: |
          echo "## 🏗️ Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Image Tag**: \`${{ steps.meta.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Event**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Builder**: ARM64 self-hosted" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ job.status }}" = "success" ]; then
            echo "### ✅ Build Successful!" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Images Built:**" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ Backend image (FastAPI)" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ Frontend image (Vue.js + Nginx)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Artifacts:** Available for deployment workflows" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Cleanup:** Build environment cleaned and optimized" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ❌ Build Failed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Check the workflow logs for detailed error information." >> $GITHUB_STEP_SUMMARY
          fi