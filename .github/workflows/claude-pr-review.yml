name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  auto-review:
    # Runs on every PR open/push, skips drafts.
    # Concurrency group cancels in-progress reviews when new commits are pushed.
    if: >
      github.event_name == 'pull_request' &&
      github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    concurrency:
      group: claude-review-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          track_progress: true
          classify_inline_comments: 'false'
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this pull request for:
            1. Bugs and logic errors
            2. Security vulnerabilities (injection, auth bypasses, exposed secrets)
            3. Performance issues (N+1 queries, unnecessary allocations, missing indexes)
            4. Race conditions and concurrency issues

            For each specific issue you find in the diff, use the
            mcp__github_inline_comment__create_inline_comment tool to post it as an
            inline comment on the exact file and line where the issue occurs.
            Set confirmed=true on each call so comments are posted immediately.

            Rules:
            - Be concise and actionable. Explain WHY something is a problem and suggest a fix.
            - Do NOT comment on code style, formatting, naming conventions, or minor preferences.
            - If the PR looks good, say so briefly. Do not manufacture issues.

            After posting all inline comments, write a brief summary of overall findings.
          claude_args: >-
            --model claude-sonnet-4-20250514
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr diff:*),Bash(gh pr view:*),Read,Glob,Grep"

  interactive:
    # Responds to @claude mentions in PR comments (org members/collaborators only)
    if: |
      (github.event_name == 'pull_request_review_comment' || github.event.issue.pull_request) &&
      contains(github.event.comment.body, '@claude') &&
      (github.event.comment.author_association == 'OWNER' ||
       github.event.comment.author_association == 'MEMBER' ||
       github.event.comment.author_association == 'COLLABORATOR')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: "--model claude-sonnet-4-20250514"
