# Production stack (runs on the EC2 host).
# - cloudflared: Cloudflare Tunnel terminates TLS at the edge and routes the public
#   hostname to backend:8000. Outbound-only, so no ports are published and no certs
#   live on the box.
# - backend: FastAPI image pulled from GHCR (public). Watchtower auto-updates it.
# - watchtower: polls GHCR every 5 min and recreates labeled containers on a new image.
#
# Deploy / rotate secrets with: `task prod:deploy` (pushes .env.prod + this file, restarts).
services:
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: skill-tree-survey-cloudflared
    command: tunnel --no-autoupdate run
    env_file:
      # provides TUNNEL_TOKEN; explicit required -> compose refuses to start without it
      - path: .env.prod
        required: true
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - skill-tree-survey
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  backend:
    image: ghcr.io/heal-engineering/skill-tree-survey-api:latest
    container_name: skill-tree-survey-backend
    env_file:
      # ADMIN_PASSWORD, CORS_ORIGINS, ENVIRONMENT, SENTRY_DSN, SENTRY_ENVIRONMENT;
      # explicit required -> no silent fall-back to insecure app defaults
      - path: .env.prod
        required: true
    environment:
      # Container-path / prod overrides (win over .env.prod).
      - DATABASE_URL=sqlite:////app/data/skill_survey.db
      - RESET_DATABASE=false
    volumes:
      - sqlite_data:/app/data
    networks:
      - skill-tree-survey
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health', timeout=5).status == 200 else 1)"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  # containrrr/watchtower is archived (Dec 2025) and broken on Docker 29; use the
  # maintained nicholas-fedor fork (drop-in: same WATCHTOWER_* env + enable label).
  watchtower:
    image: ghcr.io/nicholas-fedor/watchtower:1.17.2
    container_name: skill-tree-survey-watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_POLL_INTERVAL=300 # check GHCR every 5 minutes
      - WATCHTOWER_CLEANUP=true # prune old images after update
      - WATCHTOWER_LABEL_ENABLE=true # only manage containers with the enable label
      - WATCHTOWER_ROLLING_RESTART=true # one at a time, waits for healthy
    networks:
      - skill-tree-survey
    restart: unless-stopped
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

networks:
  skill-tree-survey:
    driver: bridge

volumes:
  sqlite_data:
    driver: local
