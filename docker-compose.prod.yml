version: '3.8'

services:
  backend:
    image: skill-survey-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: skill-survey-backend
    ports:
      - "8000:8000"
    environment:
      # Database - SQLite for simplicity, replace with PostgreSQL for scale
      - DATABASE_URL=sqlite:////app/data/skill_survey.db
      
      # Admin password - CHANGE THIS IN PRODUCTION!
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      
      # CORS - Update with your actual frontend URL
      - CORS_ORIGINS=${CORS_ORIGINS:-["http://localhost","http://localhost:80"]}
      
      # Auto-seed on first run
      - SEED_ON_STARTUP=true
      
      # API configuration
      - API_PREFIX=/api
      - APP_NAME=Skill Tree Survey
      - APP_VERSION=1.0.0
      - DEBUG=false
    volumes:
      # Persistent database storage
      - sqlite_data:/app/data
    networks:
      - skill-survey-network
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    image: skill-survey-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        # Build-time API URL configuration
        - VITE_API_URL=${VITE_API_URL:-http://localhost:8000}
    container_name: skill-survey-frontend
    ports:
      - "8080:80"
    networks:
      - skill-survey-network
    depends_on:
      - backend
    restart: always

  # Optional: Add nginx as reverse proxy for both services
  # nginx:
  #   image: nginx:alpine
  #   container_name: skill-survey-nginx
  #   ports:
  #     - "443:443"
  #     - "80:80"
  #   volumes:
  #     - ./nginx/nginx.conf:/etc/nginx/nginx.conf
  #     - ./nginx/ssl:/etc/nginx/ssl
  #   networks:
  #     - skill-survey-network
  #   depends_on:
  #     - backend
  #     - frontend
  #   restart: always

networks:
  skill-survey-network:
    driver: bridge

volumes:
  sqlite_data:
    driver: local