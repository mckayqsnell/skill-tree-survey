version: '3.8'

services:
  backend:
    image: skill-survey-backend:${IMAGE_TAG:-latest}
    container_name: test-skill-survey-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:////app/data/skill_survey_test.db
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-test-admin-password}
      - CORS_ORIGINS=${CORS_ORIGINS:-["https://test-skills-survey.heal.engineering","http://test-skills-survey.heal.engineering","http://localhost:8080"]}
      - SEED_ON_STARTUP=true
      - ENVIRONMENT=test
      - API_PREFIX=/api
      - APP_NAME=Skill Tree Survey - Test
      - APP_VERSION=1.0.0-test
      - DEBUG=false
    volumes:
      - test_sqlite_data:/app/data
    networks:
      - test-skill-survey-network
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    image: skill-survey-frontend:${IMAGE_TAG:-latest}
    container_name: test-skill-survey-frontend
    ports:
      - "8080:80"
    networks:
      - test-skill-survey-network
    depends_on:
      - backend
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80", "||", "exit", "1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  test-skill-survey-network:
    driver: bridge

volumes:
  test_sqlite_data:
    driver: local