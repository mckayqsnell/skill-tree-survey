# Local development. The frontend runs separately via `pnpm dev` (Vite proxies
# /api -> localhost:8000), so this compose only runs the backend.
# Start with: task start   (generates .env.local from 1Password if signed in).
services:
  backend:
    build:
      context: ./backend
      target: dev
    ports:
      - "${EXTERNAL_PORT:-8000}:8000"
    # Secrets pulled from 1Password into .env.local (optional — app has safe
    # local defaults, so this works even without 1Password configured).
    env_file:
      - path: .env.local
        required: false
    environment:
      # Container-path / dev overrides (these win over .env.local).
      - DATABASE_URL=sqlite:////app/data/skill_survey.db
      - ENVIRONMENT=development
      - RESET_DATABASE=${RESET_DATABASE:-false}
      - DEBUG=true
    volumes:
      - sqlite_data:/app/data
      - ./backend/app:/app/app # hot-reload (uvicorn --reload)
    networks:
      - skill-tree-survey
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health', timeout=5).status == 200 else 1)"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  skill-tree-survey:
    driver: bridge

volumes:
  sqlite_data:
    driver: local
