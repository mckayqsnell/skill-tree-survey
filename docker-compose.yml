version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: skill-survey-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:////app/data/skill_survey.db
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - CORS_ORIGINS=["http://localhost:5173","http://localhost:3000"]
      - SEED_ON_STARTUP=true
      - API_PREFIX=/api
      - APP_NAME=Skill Tree Survey
      - APP_VERSION=1.0.0
      - DEBUG=false
    volumes:
      - sqlite_data:/app/data
      - ./backend/app:/app/app  # For development hot-reload
    networks:
      - skill-survey-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: skill-survey-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules  # Prevent node_modules from being overwritten by host
    networks:
      - skill-survey-network
    depends_on:
      - backend
    restart: unless-stopped

networks:
  skill-survey-network:
    driver: bridge

volumes:
  sqlite_data:
    driver: local