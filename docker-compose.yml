version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: skill-survey-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:////app/data/skill_survey.db
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - CORS_ORIGINS=["http://localhost:5173","http://localhost:3000"]
      - SEED_ON_STARTUP=true
      - API_PREFIX=/api
      - APP_NAME=Skill Tree Survey
      - APP_VERSION=1.0.0
      - DEBUG=false
    volumes:
      - sqlite_data:/app/data
      - ./backend/app:/app/app  # For development hot-reload
    networks:
      - skill-survey-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend service placeholder - to be implemented
  frontend:
    image: node:18-alpine
    container_name: skill-survey-frontend
    working_dir: /app
    command: echo "Frontend not yet implemented"
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    networks:
      - skill-survey-network
    profiles:
      - frontend  # This prevents it from starting by default

networks:
  skill-survey-network:
    driver: bridge

volumes:
  sqlite_data:
    driver: local